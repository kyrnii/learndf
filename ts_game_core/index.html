<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ts_game_core Preview</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f4f1e8;
            color: #2b2b2b;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 252, 245, 0.88);
            box-shadow: 0 10px 24px rgba(73, 58, 36, 0.12);
            backdrop-filter: blur(6px);
            line-height: 1.6;
            pointer-events: auto;
            max-width: min(520px, calc(100vw - 32px));
        }

        .hud button,
        .hud input,
        .hud label {
            pointer-events: auto;
        }

        .hud button {
            border: 1px solid rgba(40, 40, 40, 0.18);
            background: rgba(255, 255, 255, 0.92);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
        }

        .hud button:hover {
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/browser/main.ts"></script>
</body>
</html>
